services:
  app:
    build:
      context: .
      target: prod
    image: watchdog-live
    container_name: watchdog-live-app
    env_file: .env.live
    environment:
      APP_ENV: prod
      SERVER_NAME: ":80"
      TZ: Europe/Berlin
      TRUSTED_PROXIES: "REMOTE_ADDR"
      FRANKENPHP_RESET_KERNEL: "1"
      MAX_REQUESTS: "1000"
    user: "82:82"
    ports:
      - "127.0.0.1:8086:80"
    volumes:
      - watchdog_data:/app/var
      - /app/var/cache
    restart: unless-stopped

  worker:
    image: watchdog-live
    pull_policy: never
    container_name: watchdog-live-worker
    command: php bin/console messenger:consume async notifications --time-limit=3600 --memory-limit=128M
    env_file: .env.live
    environment:
      APP_ENV: prod
      TZ: Europe/Berlin
    group_add:
      - "${DOCKER_GID:-995}"
    volumes:
      - watchdog_data:/app/var
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/var/cache
    healthcheck:
      test: ["CMD", "php", "bin/console", "about"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - app

  scheduler:
    image: watchdog-live
    pull_policy: never
    container_name: watchdog-live-scheduler
    command: php bin/console messenger:consume scheduler_checks --time-limit=3600 --memory-limit=128M --no-interaction
    env_file: .env.live
    environment:
      APP_ENV: prod
      TZ: Europe/Berlin
    volumes:
      - watchdog_data:/app/var
      - /app/var/cache
    healthcheck:
      test: ["CMD", "php", "bin/console", "about"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - app

volumes:
  watchdog_data:
