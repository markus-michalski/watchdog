services:
  app:
    build:
      context: .
      target: prod
    container_name: watchdog-live-app
    env_file: .env.live
    environment:
      SERVER_NAME: ":80"
      TZ: Europe/Berlin
      TRUSTED_PROXIES: "REMOTE_ADDR"
    ports:
      - "127.0.0.1:8086:80"
    volumes:
      - watchdog_data:/app/var
      - /app/var/cache
    restart: unless-stopped

  worker:
    build:
      context: .
      target: prod
    container_name: watchdog-live-worker
    command: php bin/console messenger:consume async notifications --time-limit=3600 --memory-limit=128M
    env_file: .env.live
    environment:
      TZ: Europe/Berlin
    group_add:
      - "${DOCKER_GID:-995}"
    volumes:
      - watchdog_data:/app/var
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/var/cache
    restart: unless-stopped
    depends_on:
      - app

  scheduler:
    build:
      context: .
      target: prod
    container_name: watchdog-live-scheduler
    command: php bin/console scheduler:run checks --no-interaction
    env_file: .env.live
    environment:
      TZ: Europe/Berlin
    volumes:
      - watchdog_data:/app/var
      - /app/var/cache
    restart: unless-stopped
    depends_on:
      - app

volumes:
  watchdog_data:
