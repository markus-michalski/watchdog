# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Trust X-Forwarded-Proto from reverse proxy — FrankenPHP/Caddy doesn't have SetEnvIf
    trusted_proxies: '%env(default::TRUSTED_PROXIES)%'
    trusted_headers:
        - x-forwarded-for
        - x-forwarded-host
        - x-forwarded-proto
        - x-forwarded-port
        - x-forwarded-prefix

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

    rate_limiter:
        api_agent:
            policy: sliding_window
            limit: 60
            interval: '1 minute'

    cache:
        pools:
            # Use filesystem instead of APCu — APCu is not shared across FrankenPHP worker processes.
            cache.rate_limiter:
                adapter: cache.adapter.filesystem

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
