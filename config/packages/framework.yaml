# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Trust X-Forwarded-Proto from reverse proxy — FrankenPHP/Caddy doesn't have SetEnvIf.
    # NEVER set TRUSTED_PROXIES=* in production — it allows clients to spoof their IP via X-Forwarded-For,
    # bypassing rate limiting and corrupting access logs. Use the actual proxy IP instead.
    trusted_proxies: '%env(default::TRUSTED_PROXIES)%'
    trusted_headers:
        - x-forwarded-for
        - x-forwarded-host
        - x-forwarded-proto
        - x-forwarded-port
        - x-forwarded-prefix

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
