framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            notifications:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: notifications
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\DispatchDueChecksMessage: sync
            App\Message\RunSiteChecksMessage: async
            App\Message\MailNotificationMessage: notifications
