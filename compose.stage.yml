services:
  app:
    build:
      context: .
      target: stage
    image: watchdog-stage
    container_name: watchdog-stage-app
    env_file: .env.stage
    environment:
      SERVER_NAME: ":80"
      TZ: Europe/Berlin
      TRUSTED_PROXIES: "REMOTE_ADDR"
    ports:
      - "127.0.0.1:8087:80"
    volumes:
      - watchdog_stage_data:/app/var
      - /app/var/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  worker:
    image: watchdog-stage
    pull_policy: never
    container_name: watchdog-stage-worker
    command: php bin/console messenger:consume async notifications --time-limit=3600 --memory-limit=128M -vv
    env_file: .env.stage
    environment:
      TZ: Europe/Berlin
    group_add:
      - "${DOCKER_GID:-995}"
    volumes:
      - watchdog_stage_data:/app/var
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/var/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    depends_on:
      - app

  scheduler:
    image: watchdog-stage
    pull_policy: never
    container_name: watchdog-stage-scheduler
    command: php bin/console scheduler:run checks --no-interaction
    env_file: .env.stage
    environment:
      TZ: Europe/Berlin
    volumes:
      - watchdog_stage_data:/app/var
      - /app/var/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    depends_on:
      - app

  mailpit:
    image: axllent/mailpit:latest
    container_name: watchdog-stage-mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "127.0.0.1:8128:8025"
    restart: unless-stopped

volumes:
  watchdog_stage_data:

networks:
  default:
    name: watchdog-stage
