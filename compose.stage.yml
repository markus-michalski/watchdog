services:
  app:
    build:
      context: .
      target: stage
    image: watchdog-stage
    container_name: watchdog-stage-app
    env_file: .env.stage
    environment:
      APP_ENV: dev
      SERVER_NAME: ":80"
      TZ: Europe/Berlin
      TRUSTED_PROXIES: "REMOTE_ADDR"
    user: "82:82"
    ports:
      - "127.0.0.1:8087:80"
    volumes:
      - watchdog_stage_data:/app/var
      - /app/var/cache
    restart: unless-stopped

  worker:
    image: watchdog-stage
    pull_policy: never
    container_name: watchdog-stage-worker
    command: php bin/console messenger:consume async notifications --time-limit=3600 --memory-limit=128M -vv
    env_file: .env.stage
    environment:
      APP_ENV: dev
      TZ: Europe/Berlin
    group_add:
      - "${DOCKER_GID:-995}"
    volumes:
      - watchdog_stage_data:/app/var
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/var/cache
    healthcheck:
      test: ["CMD", "php", "bin/console", "about"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - app

  scheduler:
    image: watchdog-stage
    pull_policy: never
    container_name: watchdog-stage-scheduler
    command: php bin/console messenger:consume scheduler_checks --time-limit=3600 --memory-limit=128M --no-interaction
    env_file: .env.stage
    environment:
      APP_ENV: dev
      TZ: Europe/Berlin
    volumes:
      - watchdog_stage_data:/app/var
      - /app/var/cache
    healthcheck:
      test: ["CMD", "php", "bin/console", "about"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - app

  mailpit:
    image: axllent/mailpit:latest
    container_name: watchdog-stage-mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "127.0.0.1:8128:8025"
    restart: unless-stopped

volumes:
  watchdog_stage_data:

networks:
  default:
    name: watchdog-stage
