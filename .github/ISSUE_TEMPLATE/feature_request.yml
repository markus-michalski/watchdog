name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. This helps make Watchdog better for everyone.

        Remember: Watchdog is released under the **PolyForm Noncommercial License 1.0.0**. Proposals must be compatible with non-commercial, self-hosted use cases. Features designed primarily to enable SaaS or commercial deployments are out of scope.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of enhancement is this?
      options:
        - New Check Type (HTTP / Port / Container / Custom)
        - Alert / Notification Channel
        - Scheduler / Interval Configuration
        - Dashboard / UI Improvement
        - Client / Group Management
        - Check Plugin System
        - Docker / Container Integration
        - Authentication / Access Control
        - Reporting / Export
        - CLI / Console Commands
        - Configuration / Setup
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Why do you need it?
      placeholder: |
        I want to monitor SSL certificate expiry dates and get an alert 30 days before expiration. Currently there is no SSL check type.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would this work?
      placeholder: |
        Add an SSL Certificate check type that reads the expiry date via TLS handshake and triggers an alert when the remaining validity drops below a configurable threshold (e.g. 30 days).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Tried other approaches? Why don't they work?
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to help implement this?
      options:
        - label: I'd be willing to submit a PR for this feature (requires signing the CLA)
        - label: I can help test if someone else implements it
        - label: I can provide more detailed requirements if needed

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, mockups, related issues, or anything else
    validations:
      required: false
