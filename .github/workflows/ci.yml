name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Europe/Berlin

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_sqlite, sqlite3, zip, opcache
          ini-values: |
            date.timezone=Europe/Berlin
            memory_limit=512M

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP-CS-Fixer
        env:
          PHP_CS_FIXER_IGNORE_ENV: 1
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction

      - name: Warm cache for PHPStan Symfony container analysis
        run: |
          mkdir -p var/cache
          bin/console cache:warmup --env=dev --no-debug
          test -f var/cache/dev/App_KernelDevDebugContainer.xml || (echo "Container XML missing after warmup!" && exit 1)
        env:
          APP_ENV: dev
          APP_SECRET: ci-secret-placeholder
          APP_ADMIN_USER: admin
          APP_ADMIN_PASSWORD_HASH: not-set
          DATABASE_URL: sqlite:////tmp/watchdog-ci/data.db
          MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
          MAILER_DSN: null://null
          MAILER_FROM: ci@example.com
          DEFAULT_URI: http://localhost

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress --error-format=github
        env:
          APP_ENV: dev
          APP_SECRET: ci-secret-placeholder

  test:
    name: PHPUnit
    runs-on: ubuntu-24.04

    env:
      APP_ENV: test
      APP_SECRET: ci-secret-placeholder
      APP_ADMIN_USER: admin
      APP_ADMIN_PASSWORD_HASH: '$2y$04$jh5U6T.rnoSFbePZ0stoHuE.gc21nNjxBZgwtBS/oYdRcJdEES66K'
      DATABASE_URL: sqlite:////tmp/watchdog-test/data_test.db
      MAILER_DSN: null://null
      MAILER_FROM: ci@example.com
      DEFAULT_URI: http://localhost
      APP_CACHE_DIR: /tmp/watchdog-test/cache
      APP_LOG_DIR: /tmp/watchdog-test/log

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_sqlite, sqlite3, zip, opcache
          ini-values: |
            date.timezone=Europe/Berlin
            memory_limit=512M

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create test directories
        run: mkdir -p /tmp/watchdog-test/cache /tmp/watchdog-test/log

      - name: Create test database schema
        run: php bin/console doctrine:schema:create --env=test --no-interaction

      - name: Build Tailwind stylesheet
        run: php bin/console tailwind:build --minify

      - name: PHPUnit
        run: vendor/bin/phpunit --no-coverage
