version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      symfony-updates:
        patterns:
          - "symfony/*"
          - "symfonycasts/*"
        update-types:
          - "minor"
          - "patch"
      composer-all:
        patterns:
          - "*"
        exclude-patterns:
          - "symfony/*"
          - "symfonycasts/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns:
          - "*"
