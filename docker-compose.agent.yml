# Example docker-compose file for deploying the watchdog agent.
# Copy this file to the monitored server and adjust environment variables.
#
# Usage:
#   docker compose -f docker-compose.agent.yml up -d

services:
  watchdog-agent:
    image: ghcr.io/markus-michalski/watchdog/agent:latest
    # Alternatively, build locally:
    # build:
    #   context: .
    #   target: agent
    restart: unless-stopped
    environment:
      # URL of the watchdog dashboard (no trailing slash)
      WATCHDOG_DASHBOARD_URL: https://watchdog.example.com
      # Agent token — generate on the dashboard under Settings > Agents
      WATCHDOG_AGENT_TOKEN: your-agent-token-here
      TZ: Europe/Berlin
    # SECURITY: pid:host gives the container visibility into ALL host processes.
    # Required for ProcessCheck. Remove if you do not use ProcessCheck.
    # Combined with a volume mount below, a container escape exposes the full host.
    pid: host
    # SECURITY: This volume mount exposes the entire host filesystem read-only.
    # Required for DiskSpaceCheck and LogFileCheck. Remove if you do not use them.
    # Combined with pid:host, a container escape grants full host read access.
    volumes:
      - /:/host/root:ro
    # Required for DockerCheck / DockerExecCheck
    # Remove if you do not use Docker checks
    # - /var/run/docker.sock:/var/run/docker.sock:ro
